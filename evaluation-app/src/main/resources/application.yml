server:
  port: 18080

spring:
  application:
    name: ai-code-change-evaluation

  # ---- 邮件（163 等 SMTP，可选；不配 host 则不启用 MailController / HtmlMailPortImpl）----
  # 163：网页邮箱 → 设置 → POP3/SMTP/IMAP → 开启 SMTP，并使用「客户端授权码」作为 password。
  mail:
   host: smtp.163.com
   port: 465
   username: 19121220069@163.com
   password: MSXs65vhDM4i3kKr
   default-encoding: UTF-8
   properties:
     mail:
       smtp:
         auth: true
         ssl:
           enable: true
  # 若使用 STARTTLS（端口以厂商说明为准，常见 25/587），可改为：
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         starttls:
  #           enable: true
  #           required: true

  # ---- PostgreSQL ----
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_evaluation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ---- Neo4j ----
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j_pass

  # ---- Kafka ----
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: index-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.sigma.ai.evaluation.domain.index.model"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: MANUAL_IMMEDIATE

# ---- MyBatis ----
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 200
    default-statement-timeout: 30

# ---- Milvus ----
milvus:
  host: localhost
  port: 19530

# ---- AI 分析上下文（组合接口）----
ai:
  context:
    max-semantic-queries: 8
    max-nodes-hard-cap: 2000
    max-edges-hard-cap: 8000
    max-paths-hard-cap: 200
    assemble-timeout-ms: 60000

# ---- Embedding ----
embedding:
  url: http://localhost:8081/v1/embeddings
  api-key: ${EMBEDDING_API_KEY:}
  model: BAAI/bge-m3
  batch-size: 25
  dimension: 1024

# ---- Kafka Topic ----
kafka:
  topic:
    code-change-event: code-change-event

# ---- GitHub Webhook（push → 同步增量索引 + 变更证据 + Dify）----
github:
  webhook:
    # 与 GitHub 仓库 Webhook 密钥一致；留空则跳过签名校验（仅本地开发）
    secret:

# ---- Dify 工作流（可选）----
dify:
  workflow:
    enabled: true
    # 仅填 API 根地址；实际请求为 {base-url}/v1/workflows/{workflow-id}/run
    base-url: https://api.dify.ai
    workflow-id: 00b6e081-9783-4b23-9418-1c46df5dbb37
    api-key: app-uvCK5dTLyVXfwCGK7tZxJdUD
    user: sigma
    # 工作流中定义的输入变量名，类型为 string，值为整包 JSON
    input-key: change_payload
    max-snippet-nodes: 120
    snippet-padding-lines: 6
    max-snippet-chars: 12000
    # blocking 工作流整体可能较慢；与 Webhook 内异步线程中的 HTTP 读超时一致（毫秒）
    read-timeout-ms: 300000
    connect-timeout-ms: 30000

# ---- 异步任务线程池 ----
thread-pool:
  index-task:
    core-size: 8
    max-size: 16
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: index-task-
  # Webhook 内异步调用 Dify（blocking 仍可能较慢，不阻塞 GitHub HTTP 应答）
  dify-workflow:
    core-size: 2
    max-size: 4
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: dify-workflow-

# ---- 定时任务 ----
index:
  scheduler:
    cron: "0 0 2 * * ?"

# ---- 日志 ----
logging:
  level:
    com.sigma.ai.evaluation: INFO
    org.neo4j.driver: WARN
    org.mybatis: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
